<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0, user-scalable=no">
<title>TizenBrowse</title>
<style>
:root{--bg:#0a0a1a;--surface:#12122a;--surface2:#1a1a3a;--accent:#4f8cff;--accent2:#3366cc;--text:#e0e0e0;--dim:#666;--border:#2a2a4a;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',Roboto,sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent;user-select:none}

.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;z-index:100}
.url-box{flex:1;height:40px;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:18px;padding:0 16px;outline:none}
.url-box:focus{border-color:var(--accent)}
.url-box.active-keyboard{border-color:#ff6b6b}

.nav-btn{height:40px;padding:0 16px;background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;gap:6px}
.nav-btn:focus{border-color:var(--accent);background:var(--accent2)}
.nav-btn:disabled{opacity:0.3;pointer-events:none}

.main{position:absolute;top:60px;left:0;right:0;bottom:0}
.browser-frame{width:100%;height:100%;border:none;background:#fff}
.loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
.loading-overlay.hidden{display:none}
.spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.home-page{position:absolute;top:60px;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:60px 100px;z-index:10}
.home-page.hidden{display:none}
.home-title{font-size:48px;font-weight:700;color:var(--accent);margin-bottom:10px}
.home-subtitle{font-size:20px;color:var(--dim);margin-bottom:50px}
.home-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;max-width:1200px}
.home-card{width:200px;height:100px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:600;transition:all 0.2s}
.home-card:focus{border-color:var(--accent);background:var(--surface2);transform:scale(1.05)}

.bookmark-bar{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:8px;overflow-x:auto;z-index:90}
.bookmark-bar.hidden{display:none}
.bm-chip{height:32px;padding:0 14px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.bm-chip:focus{border-color:var(--accent);background:var(--accent2)}

.keyboard-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.keyboard-overlay.hidden{display:none}
.kb-container{width:1920px;background:var(--surface);border-top:2px solid var(--accent);padding:16px}
.kb-input-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:0 20px}
.kb-input{flex:1;height:44px;background:var(--bg);border:2px solid var(--accent);border-radius:var(--radius);color:var(--text);font-size:20px;padding:0 16px;outline:none}
.kb-go{height:44px;padding:0 24px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-size:18px;font-weight:600;cursor:pointer}
.kb-go:focus{background:var(--accent2)}
.kb-row{display:flex;justify-content:center;gap:6px;margin-bottom:6px}
.kb-key{width:64px;height:48px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.kb-key:focus{border-color:var(--accent);background:var(--accent2)}
.kb-key.wide{width:96px}
.kb-key.wider{width:128px}
.kb-key.space{flex:1;max-width:400px}
.kb-key.special{background:var(--accent2);font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <button class="nav-btn" id="btnHome" title="Inicio">&#8962;</button>
  <button class="nav-btn" id="btnBack" title="Atrás">&#9664;</button>
  <button class="nav-btn" id="btnFwd" title="Adelante">&#9654;</button>
  <input type="text" class="url-box" id="urlBar" placeholder="Escribe una URL o busca..." readonly>
  <button class="nav-btn" id="btnGo" title="Ir">&#10148;</button>
  <button class="nav-btn" id="btnBookmark" title="Marcar">&#9734;</button>
  <button class="nav-btn" id="btnBookmarks" title="Marcadores">&#9776;</button>
</div>

<div class="bookmark-bar hidden" id="bookmarkBar"></div>

<div class="home-page" id="homePage">
  <div class="home-title">TizenBrowse</div>
  <div class="home-subtitle">Navegador para Samsung TV</div>
  <div class="home-grid" id="homeGrid"></div>
</div>

<div class="main" id="browserArea">
  <iframe class="browser-frame" id="browserFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
  </div>
</div>

<div class="keyboard-overlay hidden" id="keyboardOverlay">
  <div class="kb-container">
    <div class="kb-input-row">
      <input type="text" class="kb-input" id="kbInput" placeholder="URL o busqueda...">
      <button class="kb-go" id="kbGo">IR</button>
    </div>
    <div id="kbRows"></div>
  </div>
</div>

<script>
(function(){
  const LS_KEY = 'tizenbrowse_bookmarks';
  const SEARCH = 'https://www.google.com/search?igu=1&q=';
  const DEFAULT_BOOKMARKS = [
    {name:'Google', url:'https://www.google.com'},
    {name:'YouTube', url:'https://m.youtube.com'},
    {name:'Wikipedia', url:'https://www.wikipedia.org'},
    {name:'Reddit', url:'https://old.reddit.com'},
    {name:'DuckDuckGo', url:'https://duckduckgo.com'},
    {name:'Noticias', url:'https://news.google.com'}
  ];
  const QUICK_LINKS = [
    {name:'Google', url:'https://www.google.com', color:'#4285f4'},
    {name:'YouTube', url:'https://m.youtube.com', color:'#ff0000'},
    {name:'Wikipedia', url:'https://www.wikipedia.org', color:'#636466'},
    {name:'Reddit', url:'https://old.reddit.com', color:'#ff4500'},
    {name:'DuckDuckGo', url:'https://duckduckgo.com', color:'#de5833'},
    {name:'CNN', url:'https://edition.cnn.com', color:'#cc0000'},
    {name:'BBC', url:'https://www.bbc.com', color:'#bb1919'},
    {name:'GitHub', url:'https://github.com', color:'#333'}
  ];

  let bookmarks = JSON.parse(localStorage.getItem(LS_KEY) || 'null') || DEFAULT_BOOKMARKS;
  let history = [];
  let historyIdx = -1;
  let showHome = true;

  const $ = id => document.getElementById(id);
  const urlBar = $('urlBar');
  const browserFrame = $('browserFrame');
  const homePage = $('homePage');
  const homeGrid = $('homeGrid');
  const loadingOverlay = $('loadingOverlay');
  const bookmarkBar = $('bookmarkBar');
  const keyboardOverlay = $('keyboardOverlay');
  const kbInput = $('kbInput');
  const kbRows = $('kbRows');

  function saveBookmarks(){ localStorage.setItem(LS_KEY, JSON.stringify(bookmarks)); }

  function isUrl(s){ return s.includes('.') && !s.includes(' '); }
  function toUrl(s){ return s.startsWith('http') ? s : 'https://' + s; }
  function toSearch(s){ return SEARCH + encodeURIComponent(s); }

  function renderHome(){
    homePage.classList.remove('hidden');
    browserFrame.style.display = 'none';
    showHome = true;
    urlBar.value = '';
    homeGrid.innerHTML = '';
    QUICK_LINKS.forEach((link, i) => {
      const card = document.createElement('div');
      card.className = 'home-card';
      card.tabIndex = 0;
      card.textContent = link.name;
      card.addEventListener('click', () => navigate(link.url));
      homeGrid.appendChild(card);
    });
  }

  function renderBookmarks(){
    bookmarkBar.classList.remove('hidden');
    bookmarkBar.innerHTML = '';
    bookmarks.forEach((bm, i) => {
      const chip = document.createElement('div');
      chip.className = 'bm-chip';
      chip.tabIndex = 0;
      chip.textContent = bm.name;
      chip.addEventListener('click', () => navigate(bm.url));
      bookmarkBar.appendChild(chip);
    });
  }

  function navigate(url){
    if(!url) return;
    url = isUrl(url) ? toUrl(url) : toSearch(url);
    homePage.classList.add('hidden');
    bookmarkBar.classList.remove('hidden');
    browserFrame.style.display = 'block';
    showHome = false;
    loadingOverlay.classList.remove('hidden');

    history = history.slice(0, historyIdx + 1);
    history.push(url);
    historyIdx = history.length - 1;

    urlBar.value = url;
    browserFrame.src = url;
    updateNavButtons();
  }

  function goHome(){
    historyIdx = -1;
    history = [];
    renderHome();
    updateNavButtons();
  }

  function updateNavButtons(){
    $('btnBack').disabled = historyIdx <= 0;
    $('btnFwd').disabled = historyIdx >= history.length - 1;
    $('btnBookmark').textContent = isBookmarked(urlBar.value) ? '\u2605' : '\u2606';
  }

  function isBookmarked(url){
    return bookmarks.some(b => b.url === url);
  }

  function toggleBookmark(){
    const url = urlBar.value;
    if(!url) return;
    if(isBookmarked(url)){
      bookmarks = bookmarks.filter(b => b.url !== url);
    } else {
      const name = prompt('Nombre del marcador:', new URL(url).hostname);
      if(name) bookmarks.push({name, url});
    }
    saveBookmarks();
    renderBookmarks();
    updateNavButtons();
  }

  browserFrame.addEventListener('load', () => {
    loadingOverlay.classList.add('hidden');
    try {
      const loc = browserFrame.contentWindow.location.href;
      if(loc && loc !== 'about:blank'){
        urlBar.value = loc;
        history[historyIdx] = loc;
      }
    } catch(e){}
  });

  browserFrame.addEventListener('error', () => {
    loadingOverlay.classList.add('hidden');
  });

  $('btnHome').addEventListener('click', goHome);
  $('btnBack').addEventListener('click', () => {
    if(historyIdx > 0){ historyIdx--; urlBar.value = history[historyIdx]; browserFrame.src = history[historyIdx]; updateNavButtons(); }
  });
  $('btnFwd').addEventListener('click', () => {
    if(historyIdx < history.length - 1){ historyIdx++; urlBar.value = history[historyIdx]; browserFrame.src = history[historyIdx]; updateNavButtons(); }
  });
  $('btnGo').addEventListener('click', () => showKeyboard());
  $('btnBookmark').addEventListener('click', toggleBookmark);
  $('btnBookmarks').addEventListener('click', () => {
    if(bookmarkBar.classList.contains('hidden')) renderBookmarks();
    else bookmarkBar.classList.add('hidden');
  });
  urlBar.addEventListener('click', () => showKeyboard());

  const KB_LAYOUT = [
    '1234567890',
    'qwertyuiop',
    'asdfghjkl',
    'zxcvbnm',
  ];
  const KB_SHIFT_LAYOUT = [
    '!@#$%^&*()',
    'QWERTYUIOP',
    'ASDFGHJKL',
    'ZXCVBNM',
  ];
  let kbShift = false;

  function renderKeyboard(){
    kbRows.innerHTML = '';
    const layout = kbShift ? KB_SHIFT_LAYOUT : KB_LAYOUT;
    layout.forEach(row => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'kb-row';
      row.split('').forEach(ch => {
        const key = document.createElement('button');
        key.className = 'kb-key';
        key.textContent = ch;
        key.tabIndex = 0;
        key.addEventListener('click', () => { kbInput.value += ch; kbInput.focus(); });
        rowDiv.appendChild(key);
      });
      kbRows.appendChild(rowDiv);
    });

    const bottomRow = document.createElement('div');
    bottomRow.className = 'kb-row';

    const shiftKey = document.createElement('button');
    shiftKey.className = 'kb-key special';
    shiftKey.textContent = kbShift ? 'ABC' : 'SHIFT';
    shiftKey.tabIndex = 0;
    shiftKey.addEventListener('click', () => { kbShift = !kbShift; renderKeyboard(); });
    bottomRow.appendChild(shiftKey);

    const dotKey = document.createElement('button');
    dotKey.className = 'kb-key';
    dotKey.textContent = '.';
    dotKey.tabIndex = 0;
    dotKey.addEventListener('click', () => { kbInput.value += '.'; kbInput.focus(); });
    bottomRow.appendChild(dotKey);

    const spaceKey = document.createElement('button');
    spaceKey.className = 'kb-key space';
    spaceKey.textContent = 'ESPACIO';
    spaceKey.tabIndex = 0;
    spaceKey.addEventListener('click', () => { kbInput.value += ' '; kbInput.focus(); });
    bottomRow.appendChild(spaceKey);

    const slashKey = document.createElement('button');
    slashKey.className = 'kb-key';
    slashKey.textContent = '/';
    slashKey.tabIndex = 0;
    slashKey.addEventListener('click', () => { kbInput.value += '/'; kbInput.focus(); });
    bottomRow.appendChild(slashKey);

    const delKey = document.createElement('button');
    delKey.className = 'kb-key special';
    delKey.textContent = 'BORRAR';
    delKey.tabIndex = 0;
    delKey.addEventListener('click', () => { kbInput.value = kbInput.value.slice(0, -1); kbInput.focus(); });
    bottomRow.appendChild(delKey);

    kbRows.appendChild(bottomRow);
  }

  function showKeyboard(){
    kbShift = false;
    kbInput.value = urlBar.value;
    keyboardOverlay.classList.remove('hidden');
    renderKeyboard();
    setTimeout(() => kbInput.focus(), 100);
  }

  function hideKeyboard(){ keyboardOverlay.classList.add('hidden'); }

  $('kbGo').addEventListener('click', () => {
    hideKeyboard();
    navigate(kbInput.value);
  });
  keyboardOverlay.addEventListener('click', (e) => {
    if(e.target === keyboardOverlay) hideKeyboard();
  });

  document.addEventListener('keydown', (e) => {
    if(!keyboardOverlay.classList.contains('hidden')){
      if(e.key === 'Escape') hideKeyboard();
      if(e.key === 'Enter'){
        hideKeyboard();
        navigate(kbInput.value);
      }
      return;
    }
    if(e.key === 'Return' || e.key === 'Enter'){
      if(showHome || !urlBar.value) showKeyboard();
    }
    if(e.key === 'Escape') goHome();
  });

  renderHome();
  renderBookmarks();
  updateNavButtons();
})();
</script>
</body>
</html>
